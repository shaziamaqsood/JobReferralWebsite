<!DOCTYPE html>
<html>

<head>
    <title>Job Referral Portal</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<h1>Job Referral Portal</h1>

<a href="/jobs">
View All Jobs
</a>

<br><br>

<a href="/admin/login">
Admin Login
</a>


{% for job in jobs %}

<div>

<h2>{{ job.title }}</h2>

<p>
Company: {{ job.company }}
</p>

<p>
Pay: {{ job.pay }}
</p>

<a href="/job/{{ job.id }}">
View Details
</a>

</div>

<hr>

{% endfor %}


</body>

</html>
